services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: quantrade
      POSTGRES_USER: quantrade
      POSTGRES_PASSWORD: quantrade
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantrade -d quantrade"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    env_file:
      - .env.local
    environment:
      QUANTRADE_MODE: fixture
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:

